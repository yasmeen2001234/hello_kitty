    <script>
      // Dress-up drag and snap logic for SVG images
      window.addEventListener("DOMContentLoaded", function () {
        const svg = document.querySelector("svg");
        const dressImg = document.getElementById("DressDrag");
        const shirtImg = document.getElementById("ShirtDrag");
        const dressSnapPoint = document.getElementById("dress-snap-point");
        const shirtSnapPoint = document.getElementById("shirt-snap-point");
        const flowerImg = document.getElementById("FlowerDrag");
        const flowerSnapPoint = document.getElementById("flower-snap-point");

        // Shared snap state
        const snapped = {
          dress: false,
          shirt: false,
          flower: false,
        };

        function checkAllSnapped() {
          const btn = document.getElementById("cute-btn");
          if (snapped.dress && snapped.shirt && snapped.flower) {
            btn.style.display = "block";
            btn.classList.add("pop");
          } else {
            btn.style.display = "none";
            btn.classList.remove("pop");
          }
        }



        function getSnapCoords(snapElem) {
          return {
            x: parseFloat(snapElem.getAttribute("cx")),
            y: parseFloat(snapElem.getAttribute("cy")),
          };
        }

        function makeSVGDraggable(svgImg, snapElem) {
          let offset = { x: 0, y: 0 };
          let dragging = false;


            // Mouse events
            svgImg.addEventListener("mousedown", startDrag);
            svg.addEventListener("mousemove", drag);
            svg.addEventListener("mouseup", endDrag);
            svg.addEventListener("mouseleave", endDrag);

            // Touch events
            svgImg.addEventListener("touchstart", startDrag, { passive: false });
            svg.addEventListener("touchmove", drag, { passive: false });
            svg.addEventListener("touchend", endDrag);
            svg.addEventListener("touchcancel", endDrag);


            function getPointerSVGCoords(evt) {
              const pt = svg.createSVGPoint();
              let clientX, clientY;
              if (evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX;
                clientY = evt.touches[0].clientY;
              } else if (evt.changedTouches && evt.changedTouches.length > 0) {
                clientX = evt.changedTouches[0].clientX;
                clientY = evt.changedTouches[0].clientY;
              } else {
                clientX = evt.clientX;
                clientY = evt.clientY;
              }
              pt.x = clientX;
              pt.y = clientY;
              return pt.matrixTransform(svg.getScreenCTM().inverse());
            }

            function startDrag(evt) {
              evt.preventDefault();
              dragging = true;
              svgImg.style.opacity = 0.7;
              const pointer = getPointerSVGCoords(evt);
              offset.x = pointer.x - parseFloat(svgImg.getAttribute("x"));
              offset.y = pointer.y - parseFloat(svgImg.getAttribute("y"));
            }

            function drag(evt) {
              if (!dragging) return;
              evt.preventDefault();
              const pointer = getPointerSVGCoords(evt);
              svgImg.setAttribute("x", pointer.x - offset.x);
              svgImg.setAttribute("y", pointer.y - offset.y);
            }

            function endDrag(evt) {
              if (!dragging) return;
              dragging = false;
              svgImg.style.opacity = 1;
              // Snap logic
              const snapPos = getSnapCoords(snapElem);
              const imgX =
                parseFloat(svgImg.getAttribute("x")) +
                parseFloat(svgImg.getAttribute("width")) / 2;
              const imgY =
                parseFloat(svgImg.getAttribute("y")) +
                parseFloat(svgImg.getAttribute("height")) / 2;
              const dx = imgX - snapPos.x;
              const dy = imgY - snapPos.y;
              const snapRadius = 60;
              let key = null;
              if (svgImg.id === "DressDrag") key = "dress";
              if (svgImg.id === "ShirtDrag") key = "shirt";
              if (svgImg.id === "FlowerDrag") key = "flower";
              if (Math.sqrt(dx * dx + dy * dy) < snapRadius) {
                // Snap to target
                svgImg.setAttribute(
                  "x",
                  snapPos.x - parseFloat(svgImg.getAttribute("width")) / 2,
                );
                svgImg.setAttribute(
                  "y",
                  snapPos.y - parseFloat(svgImg.getAttribute("height")) / 2,
                );
                if (key) snapped[key] = true;
              } else {
                if (key) snapped[key] = false;
              }
              checkAllSnapped();
            }
        }

        makeSVGDraggable(dressImg, dressSnapPoint);
        makeSVGDraggable(shirtImg, shirtSnapPoint);
        makeSVGDraggable(flowerImg, flowerSnapPoint);
       
      });
